services:
  nginx:
    build: ./nginx
    container_name: datakyc_nginx
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - datakyc_network

  api:
    build: .
    container_name: datakyc_api
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datakyc_network

  postgres:
    image: postgres:16-alpine
    container_name: datakyc_postgres
    environment:
      POSTGRES_DB: datakyc
      POSTGRES_USER: datakyc
      POSTGRES_PASSWORD: datakyc_secret
    ports:
      - "5433:5432"
    volumes:
      - datakyc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datakyc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - datakyc_network

  redis:
    image: redis:7-alpine
    container_name: datakyc_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - datakyc_network

volumes:
  datakyc_pgdata:

networks:
  datakyc_network:
    driver: bridge
